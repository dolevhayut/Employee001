name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Lint + build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - run: npm ci

      # Lint is informational while we clean up legacy warnings.
      # Build is the real gate.
      - name: Lint (non-blocking)
        run: npm run lint
        continue-on-error: true

      - name: Build
        run: npm run build

      - name: Verify standalone artifacts
        run: |
          test -f .next/standalone/server.js
          test -d .next/standalone/.next/static
          test -d .next/standalone/public
