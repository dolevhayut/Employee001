name: Release

# Triggered by pushing a `v*` tag. Builds the project, sanity-checks that
# package.json#version matches the tag, publishes to npm, and creates a
# GitHub Release with auto-generated notes.
#
# Required secrets:
#   NPM_TOKEN   — Automation token with publish rights on the `employee001`
#                 npm package. (Settings → Secrets → Actions)
#   GITHUB_TOKEN is provided automatically by Actions; no setup needed.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write    # needed for `gh release create`
  id-token: write    # needed for npm provenance

jobs:
  release:
    name: Build and publish
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history so release-notes generator has context

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
          cache: "npm"

      - name: Verify tag matches package.json
        run: |
          TAG="${GITHUB_REF##refs/tags/}"
          PKG_VERSION="$(node -p "require('./package.json').version")"
          if [ "$TAG" != "v$PKG_VERSION" ]; then
            echo "::error::Tag $TAG does not match package.json version v$PKG_VERSION."
            echo "Bump package.json before tagging, or retag to match."
            exit 1
          fi
          echo "Tag $TAG matches package.json version. Proceeding."

      - name: Install dependencies
        run: npm ci

      # Lint is informational; build is the gate.
      - name: Lint (non-blocking)
        run: npm run lint
        continue-on-error: true

      - name: Build
        run: npm run build

      - name: Verify standalone build output
        run: |
          test -f .next/standalone/server.js \
            || (echo "::error::Build did not produce .next/standalone/server.js"; exit 1)
          test -d .next/standalone/.next/static \
            || (echo "::error::post-build did not copy .next/static into standalone"; exit 1)

      - name: Pack (dry run, for log inspection)
        run: npm pack --dry-run

      - name: Publish to npm
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF##refs/tags/}"
          gh release create "$TAG" \
            --title "$TAG" \
            --generate-notes \
            --verify-tag
