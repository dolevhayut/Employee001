version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 8
    groups:
      prod-patch:
        dependency-type: production
        update-types:
          - patch
      prod-minor:
        dependency-type: production
        update-types:
          - minor
      prod-major:
        dependency-type: production
        update-types:
          - major
      dev-patch:
        dependency-type: development
        update-types:
          - patch
      dev-minor:
        dependency-type: development
        update-types:
          - minor
      dev-major:
        dependency-type: development
        update-types:
          - major
